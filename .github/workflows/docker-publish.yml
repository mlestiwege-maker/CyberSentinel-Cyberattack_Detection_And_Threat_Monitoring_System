name: Build & Publish Docker image

on:
  push:
    branches: [ main, master, 'release/**' ]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    name: Build and push backend image to GitHub Container Registry (GHCR)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        if: secrets.GHCR_PAT != ''
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ secrets.GHCR_PAT != '' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/cybersentinel-backend:latest
            ghcr.io/${{ github.repository_owner }}/cybersentinel-backend:${{ github.sha }}

      - name: Upload image digest
        if: secrets.GHCR_PAT != ''
        run: echo "Image published to GHCR: ghcr.io/${{ github.repository_owner }}/cybersentinel-backend:${{ github.sha }}"

      - name: Skip publishing message
        if: secrets.GHCR_PAT == ''
        run: |
          echo "GHCR_PAT secret not configured; built image was not pushed."
