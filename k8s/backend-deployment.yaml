apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybersentinel-backend
  labels:
    app: cybersentinel-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cybersentinel-backend
  template:
    metadata:
      labels:
        app: cybersentinel-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/<your-org>/cybersentinel-backend:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: cybersentinel-backend
spec:
  selector:
    app: cybersentinel-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
